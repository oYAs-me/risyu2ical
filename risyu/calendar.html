<!DOCTYPE html>
<html>
  <head lang="ja">
    <meta http-equiv="Content-Type" content="text/html" charset="UTF-8" />
    <title>カレンダーの反映</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/risyu.css" />
  </head>
  <body>
    <div class="mainpage">
    <nav class="navbar">
        <div class="navbar-header">
        <a class="navbar-top" href="/">イットリウムの蔵</a>
        </div>
    </nav>
    <div class="content_section">
        <h1>カレンダー情報の反映方法</h1>
        <h2>Google Calendarの場合</h2>
        <div id="google">
        <img class="google_img" src="./images/google1.png">
        <p class="google">1. Google Calendarのサイドバーから「＋」を選択する</p>
        <img class="google_img" src="./images/google2.png">
        <p class="google">2. URLをコピーした場合は「URLで追加」を(=> 3)、ファイルをダウンロードした場合は「インポート」を(=> 4)選択する</p>
        <img class="google_img" src="./images/google3.png">
        <p class="google">3. コピーしたURLを貼り付け「カレンダーを追加」を押す</p>
        <img class="google_img" src="./images/google4.png">
        <p class="google">4. ダウンロードしたファイルを選択して「インポート」を押す</p>
        </div>
    </div>
    </div>
  </body>
